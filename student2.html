<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard - KSRMCE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI", sans-serif;}
body{display:flex;min-height:100vh;background:linear-gradient(135deg,#dfe9f3,#ffffff);overflow:hidden;}
body::before,body::after{content:"";position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,0.6),transparent);filter:blur(120px);z-index:0;}
body::before{top:-150px;left:-150px;}
body::after{bottom:-150px;right:-150px;}
.sidebar{width:250px;height:100vh;z-index:2;backdrop-filter:blur(70px);background:rgba(255,255,255,0.2);border-right:1px solid rgba(255,255,255,0.4);padding:20px;}
.menu div{padding:12px;margin:10px 0;border-radius:14px;cursor:pointer;background:rgba(255,255,255,0.2);transition:.3s;}
.menu div:hover{background:rgba(255,255,255,0.5);transform:translateX(5px);}
.main{flex:1;padding:30px;overflow-y:auto;z-index:2;}
.card{backdrop-filter:blur(70px);background:rgba(255,255,255,0.3);border-radius:25px;padding:25px;border:1px solid rgba(255,255,255,0.4);margin-bottom:20px;}
.bar-container{background:#eee; height:35px; border-radius:20px; overflow:hidden; margin-top:15px; position:relative;}
#percBar{height:100%; width:0%; background:linear-gradient(to right, #4caf50, #8bc34a); transition:1.5s;}
#percText{position:absolute; right:15px; top:8px; font-weight:bold;}
.post{background:rgba(255,255,255,0.7); margin-top:10px; padding:15px; border-radius:15px; border-left:5px solid #7fffd4;}
.hidden{display:none;}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Student Panel</h2>
    <div class="menu">
        <div onclick="show('home')">🏠 Dashboard</div>
        <div onclick="show('att-sec')">📊 Attendance</div>
        <div onclick="show('feed-sec')">📢 Classroom Feed</div>
    </div>
    <div onclick="logout()" style="color:red; cursor:pointer; margin-top:30px;">Logout</div>
</div>

<div class="main">
    <div id="home" class="section">
        <div class="card"><h2>Welcome</h2><p>Roll No: <b id="uRoll"></b></p></div>
    </div>

    <div id="att-sec" class="section hidden">
        <div class="card">
            <h2>My Attendance</h2>
            <p>Total Classes: <b id="t">0</b> | Present: <b id="p" style="color:green;">0</b></p>
            <div class="bar-container"><div id="percBar"></div><span id="percText">0%</span></div>
        </div>
    </div>

    <div id="feed-sec" class="section hidden">
        <div class="card"><h2>Classroom Updates</h2><div id="sFeed"></div></div>
    </div>
</div>

<script>
// Check Login
if(localStorage.getItem("role") !== "student") window.location.href="index.html";
const myRoll = localStorage.getItem("roll");
document.getElementById("uRoll").innerText = myRoll;

function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(id === 'att-sec') calcAtt();
    if(id === 'feed-sec') loadFeed();
}

function calcAtt(){
    const db = JSON.parse(localStorage.getItem("attendanceDB") || "{}");
    const myData = db[myRoll] || {p: 0, t: 0};
    const perc = myData.t > 0 ? Math.round((myData.p/myData.t)*100) : 0;

    document.getElementById("t").innerText = myData.t;
    document.getElementById("p").innerText = myData.p;
    document.getElementById("percBar").style.width = perc + "%";
    document.getElementById("percText").innerText = perc + "%";
}

function loadFeed(){
    const posts = JSON.parse(localStorage.getItem("classroomPosts") || "[]");
    document.getElementById("sFeed").innerHTML = posts.map(p => `
        <div class="post"><small>${p.date}</small><p>${p.content}</p></div>
    `).join('');
}

// REAL-TIME SYNC: Listen for staff updates
window.addEventListener('storage', (e) => {
    if (e.key === 'classroomPosts' || e.key === 'attendanceDB') {
        loadFeed();
        if(!document.getElementById('att-sec').classList.contains('hidden')) calcAtt();
    }
});

function logout(){ localStorage.clear(); window.location.href="index.html"; }
loadFeed();
</script>
</body>
</html>
